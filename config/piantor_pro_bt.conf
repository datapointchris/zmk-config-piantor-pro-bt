# Deep sleep after 2 hours of idle
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

# Increase BT transmit power to max (+8 dBm) for reliable split communication
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# WARNING: Do NOT enable CONFIG_ZMK_BLE_EXPERIMENTAL_SEC
# It switches pairing from "Just Works" to passkey-based, which causes
# pairing to hang indefinitely on Linux (BlueZ) and fail on some hosts.
